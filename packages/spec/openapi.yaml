        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/operations/alerts/{id}/retry:
    post:
      operationId: retryOperationsAlertDelivery
      summary: Retry delivery for a failed or dead-lettered alert
      tags: [Operations]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { $ref: "#/components/parameters/IdempotencyKey" }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OperationsMutationRequest" }
      responses:
        "202":
          description: Alert delivery retry queued with bounded backoff state reset.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OperationsAlert" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "503": { $ref: "#/components/responses/ServiceUnavailable" }

  /v1/operations/traces:
    get:
      operationId: listOperationsTraces
      summary: Filter sampled traces
      tags: [Operations]
      parameters:
        - { name: from, in: query, required: false, schema: { type: string, format: date-time } }
        - { name: to, in: query, required: false, schema: { type: string, format: date-time } }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
        - { name: before, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Environment-scoped sampled successes and retained errors.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TracePage" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }

  /v1/operations/traces/{traceId}:
    get:
      operationId: getOperationsTrace
      summary: Get one correlated trace
      tags: [Operations]
      parameters:
        - { name: traceId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Correlated trace spans.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TracePage" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

tags:
  - name: Health
    description: Service health
  - name: OAuth
    description: Discoverable client metadata for tunnel + hosted API origins
  - name: Sync
    description: Protected ATProto-backed reader accelerators
  - name: Publications
    description: Unified sidebar projection, resolver, and gateway write-through
  - name: AppView
    description: GDPR-safe Level-1 entry index gated behind `ENABLE_THIN_APPVIEW`
  - name: Latr
    description: Authenticated L@tr read-later iOS proxy (`LATR_IOS_PROXY_*` server credentials)
  - name: Operations
    description: Operator-DID-allowlisted observability and recovery control plane
