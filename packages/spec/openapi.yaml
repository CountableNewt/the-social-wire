          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [state]
              properties:
                state:
                  type: string
                  enum: [archived, unread]
      responses:
        "200":
          description: State updated.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: L@tr iOS proxy credentials (`LATR_IOS_PROXY_*`) not configured on this host.

  /v1/latr/saves/{rkey}:
    delete:
      operationId: deleteLatrSave
      summary: Delete a saved item
