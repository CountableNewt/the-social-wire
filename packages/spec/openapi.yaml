  # ── L@tr read-later proxy (Social Wire Gateway iOS proxy) ─────────────────

  /v1/latr/saves:
    get:
      operationId: listLatrSaves
      summary: List L@tr saved items with gateway enrichment
      description: |
        Proxies to the external L@tr Gateway for native iOS clients. Requires viewer OAuth DPoP on this host,
        `X-Latr-Gateway-DPoP` bound to the upstream L@tr URL, and optional
        `X-ATProto-Upstream-DPoP` for PDS listRecords write-through.
        Server injects L@tr credentials from `LATR_IOS_PROXY_*` Fly/runtime secrets (distinct from web
        Vercel `LATR_GATEWAY_*`); clients must not ship API keys.
      tags: [Latr]
      responses:
        "200":
          description: Saved item records with preview enrichment.
          content:
            application/json:
              schema:
                type: object
                required: [records]
                properties:
                  records:
                    type: array
                    items:
                      type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: L@tr iOS proxy credentials (`LATR_IOS_PROXY_*`) not configured on this host.
    post:
      operationId: createLatrSave
      summary: Save a URL or native subject via L@tr Gateway
      tags: [Latr]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Save created.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: L@tr iOS proxy credentials (`LATR_IOS_PROXY_*`) not configured on this host.

