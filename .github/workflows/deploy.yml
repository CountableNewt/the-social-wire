name: Deploy

# Automatic deploy runs at the end of CI (.github/workflows/ci.yml) so it uses the
# pushed branch workflow — workflow_run only reads the default-branch copy of this
# file and is easy to misconfigure across main/dev.
on:
  workflow_dispatch:
    inputs:
      branch:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - main
      deploy_worker:
        description: Also deploy Thin AppView worker
        required: true
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-api:
    name: Deploy API (Fly.io)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_DEV: ${{ secrets.FLY_APP_DEV }}
          FLY_APP_PROD: ${{ secrets.FLY_APP_PROD }}
        run: bash scripts/fly-deploy-api.sh "${{ inputs.branch }}"

      - name: Deploy worker to Fly.io
        if: inputs.deploy_worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_WORKER_APP_DEV: ${{ secrets.FLY_WORKER_APP_DEV }}
          FLY_WORKER_APP_PROD: ${{ secrets.FLY_WORKER_APP_PROD }}
        run: bash scripts/fly-deploy-worker.sh "${{ inputs.branch }}"

  # ── Web deploy (Vercel handles this via its GitHub integration) ────────────
  # Vercel auto-deploys on push to main (prod) and dev (preview).
