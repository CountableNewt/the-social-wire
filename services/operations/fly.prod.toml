app = 'the-social-wire-prod-operations'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'
  context = '../..'

[env]
  APP_ENV = 'prod'
  POSTGRES_MAX_CONNECTIONS = '2'
  PORT = '8083'
  OPERATIONS_TELEMETRY_ENABLED = 'true'
  OPERATIONS_RECOVERY_ENABLED = 'false'
  OPERATIONS_ALERT_DELIVERY_ENABLED = 'false'

[http_service]
  internal_port = 8083
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/readyz'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
