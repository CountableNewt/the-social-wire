# Production AppView worker (main). Dev uses fly.toml.
#
# Deploy: bash deploy.sh main

app = 'the-social-wire-prod-appview-worker'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'
  context = '../..'

[deploy]
  wait_timeout = '10m0s'

[env]
  APP_ENV = 'prod'
  ENABLE_THIN_APPVIEW = 'true'
  POSTGRES_MAX_CONNECTIONS = '2'
  OPERATIONS_RECOVERY_ENABLED = 'false'
  # Production remains disabled until the dev parity gate and production Tap provisioning pass.
  TAP_CONSUMER_MODE = 'disabled'
  TAP_BASE_URL = 'http://the-social-wire-prod-tap.internal:2480'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
