# Deploy from repo root: bash services/appview-worker/deploy.sh dev
# Or: fly deploy ../.. --config services/appview-worker/fly.toml --app the-social-wire-dev-appview-worker

app = 'the-social-wire-dev-appview-worker'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'
  context = '../..'

[env]
  APP_ENV = 'dev'
  ENABLE_THIN_APPVIEW = 'true'
  POSTGRES_MAX_CONNECTIONS = '2'
  OPERATIONS_RECOVERY_ENABLED = 'true'
  # Change to 'shadow' only after the dev Tap app and matching password secret are provisioned.
  TAP_CONSUMER_MODE = 'disabled'
  TAP_BASE_URL = 'http://the-social-wire-dev-tap.internal:2480'
  # Per-app secret (same pooler URI as gateway/appview):
  # fly secrets set SUPABASE_DATABASE_URL='postgresql://postgres.[ref]:...' --app the-social-wire-dev-appview-worker
  # TAP_ADMIN_PASSWORD must match the environment-specific Tap app before shadow mode is enabled.

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
