# Deploy from repo root: bash services/appview-worker/deploy.sh dev
# Or: fly deploy ../.. --config services/appview-worker/fly.toml --app the-social-wire-dev-appview-worker

app = 'the-social-wire-dev-appview-worker'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'
  context = '../..'

[env]
  ENABLE_THIN_APPVIEW = 'true'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
