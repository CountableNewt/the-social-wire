# Production Thin AppView worker (main). Dev uses fly.toml.
#
# Deploy: bash scripts/fly-deploy-worker.sh main

app = 'the-social-wire-prod-worker'
primary_region = 'ams'

[build]
  dockerfile = 'services/worker/Dockerfile'

[deploy]
  wait_timeout = '10m0s'

[env]
  ENABLE_THIN_APPVIEW = 'true'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
