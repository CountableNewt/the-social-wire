# Production API (main). Dev uses fly.toml (the-social-wire-dev).
#
# Deploy: bash scripts/fly-deploy-api.sh main
#   (uses --app from FLY_APP_PROD; this file documents the prod app name.)

app = 'the-social-wire-prod'
primary_region = 'ams'

[build]
  dockerfile = 'services/api/Dockerfile'

[deploy]
  wait_timeout = '10m0s'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '1m0s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
